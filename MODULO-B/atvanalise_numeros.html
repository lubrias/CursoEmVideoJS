<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Analisador de números</title>
    <link rel="stylesheet" href="atvanalise_numeros.css">
    <script src="atvanalise_numeros.js" defer></script>
</head>
<body>
    <header>
        <h1>Analisador de números</h1>
    </header>
    <section>
        <div>
            <p>Numero (entre 1 e 100): <input type="number" name="num" id="num"> 
            <input type="button" value="Adicionar" onclick="adicionar()"></p>
        </div>
        <div id="div2">
            <select name="opcoes" id="opcoes" size="10">
                <option>Digite um número acima.</option>
            </select>
        </div>
        <button onclick="finalizar()">Finalizar</button>
    </section>
    
</body>
</html>
