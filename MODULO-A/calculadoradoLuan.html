<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Somando números - TREINO</title>
    <link rel="stylesheet" href="calculadoradoLuan.css">
    <script src="calculadoradoLuan.js"></script>
</head>
<body>
    <h1 id="titulo">Calculadora do Luan</h1>
    <hr>

    <h1 id="h1">Somando valores:</h1>
    <input type="number" name="soman1" id="soman1">
    <input type="number" name="soman2" id="soman2">
    <input type="button" value="Somar" onclick="somar()">
    <div id="res"></div>

<hr>
    <h1 id="h2">Multiplicando valores</h1>
    <input type="number" name="multiplicacaon1" id="multiplicacaon1">
    <input type="number" name="multiplicacaon2" id="multiplicacaon2">
    <input type="button" value="Multiplicar" onclick="multiplicar()">
    <div id="res2"></div>
<hr>

    <h1 id="h3">Subtraindo valores</h1>
    <input type="number" name="subtracaon1" id="subtracaon1">
    <input type="number" name="subtracaon2" id="subtracaon2">
    <input type="button" value="Subtrair" onclick="subtrair()">
    <div id="res3"></div>

<hr>

    <h1 id="h4">Dividindo valores</h1>
    <input type="number" name="divisaon1" id="divisaon1">
    <input type="number" name="divisaon2" id="divisaon2">
    <input type="button" value="Dividir" onclick="dividir()">
    <div id="res4"></div>
</body>
</html>
