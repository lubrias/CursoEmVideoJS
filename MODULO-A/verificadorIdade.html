<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verificador de Idade</title>
    <style>
        #h1 {
            color: red;
        }
    </style>
</head>
<body>
    <h1 id="h1">Bem vindo ao verificador de idade!</h1>
    <hr>
    Minha idade atual é <input type="number" name="idade" id="idade">
    <input type="button" value="Verificar" onclick="verificador()">
    <div id="res"></div>

    <script>
        function verificador() {
            var ver = window.document.getElementById('idade')
            var res = window.document.getElementById('res')
            var idade = Number(ver.value)
            if (idade >= 18) {
                res.innerHTML = `Você tem 18+ anos. Jovem`
            } else if (idade <18 && idade >= 13) {
                res.innerHTML = `Você é adolescente(13-17)`
            } else if (idade < 13 && idade >=6) {
                res.innerHTML = `Você é criança. 12 anos pra baixo.`
            } else if (idade <= 5 && idade>=1 ) {
                res.innerHTML = `Que? Nem era pra você estar mexendo aqui!`
            } else {
                res.innerHTML = `Mas aí é foda também, extraterrestre`
            }
        }
    </script>
</body>
</html>
