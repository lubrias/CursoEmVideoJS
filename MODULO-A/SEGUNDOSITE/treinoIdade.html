<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Site de Idade</title>
    <link rel="stylesheet" href="treinoIdade.css">
</head>
<body>
    <header>
        <h1>Verificador de Idade - Treino</h1></header>
        <section>
            <div id="div1">
                Ano de nascimento <input type="number" name="txtano" id="txtano" min="0">
            </div>
            <div id="res">
                <p>Sexo:
                    <input type="radio" name="radsex" id="masc" checked>
                    <label for="masc">Masculino</label>
                    <input type="radio" name="radsex" id="fem">
                    <label for="fem">Feminino</label>
                </p>
                <p>
                    <input type="button" value="Verificar" onclick="verificar()">
                </p>
            </div>
        </section>
        <footer>
            <p>&copy; Lubrias</p>
        </footer>
    </header>
    <script src="treinoIdade.js"></script>
</body>
</html>
